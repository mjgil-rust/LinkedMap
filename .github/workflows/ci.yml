name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test --all-targets

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Generate coverage summary
        run: |
          mkdir -p target/llvm-cov
          cargo llvm-cov --workspace --summary-only --output-path target/llvm-cov/full-report.txt
          cp target/llvm-cov/full-report.txt target/llvm-cov/summary.txt

      - name: Render coverage summary
        run: |
          python scripts/render_coverage_summary.py > target/llvm-cov/summary.md
          cat target/llvm-cov/summary.md
          {
            cat target/llvm-cov/summary.md
            echo
            echo '<details><summary>Raw cargo-llvm-cov summary</summary>'
            echo
            echo '```text'
            cat target/llvm-cov/summary.txt
            echo '```'
            echo
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v6
        with:
          name: coverage-artifacts
          path: |
            target/llvm-cov/summary.md
            target/llvm-cov/summary.txt
            target/llvm-cov/full-report.txt
