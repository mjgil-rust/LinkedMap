name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test --all-targets

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Generate coverage summary
        run: |
          mkdir -p target/llvm-cov
          cargo llvm-cov --workspace --summary-only | tee target/llvm-cov/summary.txt

      - name: Render coverage summary
        run: |
          python - <<'PY' > target/llvm-cov/summary.md
          from pathlib import Path

          rows = []
          for line in Path("target/llvm-cov/summary.txt").read_text().splitlines():
              line = line.strip()
              if not line or not (line.startswith("/") or line.startswith("TOTAL")):
                  continue

              parts = line.split()
              rows.append(
                  {
                      "file": parts[0],
                      "regions": parts[3],
                      "functions": parts[6],
                      "lines": parts[9],
                  }
              )

          print("## Coverage Summary")
          print()
          print("| File | Regions | Functions | Lines |")
          print("| --- | ---: | ---: | ---: |")
          for row in rows:
              print(
                  f"| `{row['file']}` | {row['regions']} | {row['functions']} | {row['lines']} |"
              )
          PY

          cat target/llvm-cov/summary.md
          {
            cat target/llvm-cov/summary.md
            echo
            echo '<details><summary>Raw cargo-llvm-cov summary</summary>'
            echo
            echo '```text'
            cat target/llvm-cov/summary.txt
            echo '```'
            echo
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate LCOV report
        run: cargo llvm-cov --workspace --lcov --output-path target/llvm-cov/lcov.info

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v6
        with:
          name: coverage-artifacts
          path: |
            target/llvm-cov/summary.md
            target/llvm-cov/summary.txt
            target/llvm-cov/lcov.info
